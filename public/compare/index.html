<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Compare — Decades Apart</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #f3f4f6; }
  h1, h2 { font-family: 'Playfair Display', serif; }
  .cell { position: relative; aspect-ratio: 1; background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a2a; }
  .cell img { width: 100%; height: 100%; object-fit: cover; }
  .cell .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 12px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
  .spinner { border: 3px solid #333; border-top-color: #719483; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .drop-zone { border: 2px dashed #333; transition: all 0.2s; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #719483; background: rgba(113,148,131,0.05); }
</style>
</head>
<body class="min-h-screen">

<div class="max-w-7xl mx-auto px-4 py-8">
  <div class="mb-8">
    <h1 class="text-2xl mb-1 text-zinc-400">Model Compare <span class="text-zinc-600 text-base font-sans">/ internal</span></h1>
    <p class="text-xs text-zinc-600">1 photo, 4 models, 2 decades. See what's good.</p>
  </div>

  <!-- Upload + Controls -->
  <div id="controls" class="flex flex-wrap gap-4 items-end mb-8">
    <div>
      <label class="block text-xs text-zinc-500 mb-1">Photo</label>
      <div id="drop-zone" class="drop-zone rounded-xl w-32 h-32 flex items-center justify-center cursor-pointer text-zinc-600 text-xs text-center p-2">
        <span id="drop-label">Drop or click</span>
        <img id="preview" class="hidden w-full h-full object-cover rounded-lg" />
      </div>
      <input type="file" id="file-input" accept="image/*" class="hidden" />
    </div>

    <div>
      <label class="block text-xs text-zinc-500 mb-1">2nd photo (optional)</label>
      <div id="drop-zone-2" class="drop-zone rounded-xl w-32 h-32 flex items-center justify-center cursor-pointer text-zinc-600 text-xs text-center p-2">
        <span id="drop-label-2">Drop or click</span>
        <img id="preview-2" class="hidden w-full h-full object-cover rounded-lg" />
      </div>
      <input type="file" id="file-input-2" accept="image/*" class="hidden" />
    </div>

    <div>
      <label class="block text-xs text-zinc-500 mb-1">Persona</label>
      <select id="persona" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white">
        <option value="classic">Classic</option>
        <option value="rebel">Rebel</option>
        <option value="star">Star</option>
        <option value="visionary">Visionary</option>
      </select>
    </div>

    <button id="go" disabled class="bg-[#719483] text-white px-6 py-2 rounded-lg text-sm font-medium disabled:opacity-30 disabled:cursor-not-allowed hover:bg-[#5f7d6e] transition-colors">
      Compare Models
    </button>

    <span id="status" class="text-xs text-zinc-600"></span>
  </div>

  <!-- Results Grid -->
  <div class="overflow-x-auto">
    <table class="w-full border-collapse">
      <thead>
        <tr>
          <th class="text-left text-xs text-zinc-600 uppercase tracking-wider pb-2 pr-3 w-16"></th>
          <th id="h0" class="text-center text-xs text-zinc-500 uppercase tracking-wider pb-2 px-2">gemini-3-pro</th>
          <th id="h1" class="text-center text-xs text-zinc-500 uppercase tracking-wider pb-2 px-2">gemini-3.1-flash</th>
          <th id="h2" class="text-center text-xs text-zinc-500 uppercase tracking-wider pb-2 px-2">imagen-4-fast</th>
          <th id="h3" class="text-center text-xs text-zinc-500 uppercase tracking-wider pb-2 px-2">gemini-2.5-flash</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="text-xs text-zinc-500 pr-3 align-top pt-2 font-medium">1920s</td>
          <td class="p-1"><div class="cell" id="c-0-0"><div class="flex items-center justify-center h-full text-zinc-700 text-xs">—</div></div></td>
          <td class="p-1"><div class="cell" id="c-0-1"><div class="flex items-center justify-center h-full text-zinc-700 text-xs">—</div></div></td>
          <td class="p-1"><div class="cell" id="c-0-2"><div class="flex items-center justify-center h-full text-zinc-700 text-xs">—</div></div></td>
          <td class="p-1"><div class="cell" id="c-0-3"><div class="flex items-center justify-center h-full text-zinc-700 text-xs">—</div></div></td>
        </tr>
        <tr>
          <td class="text-xs text-zinc-500 pr-3 align-top pt-2 font-medium">1960s</td>
          <td class="p-1"><div class="cell" id="c-1-0"><div class="flex items-center justify-center h-full text-zinc-700 text-xs">—</div></div></td>
          <td class="p-1"><div class="cell" id="c-1-1"><div class="flex items-center justify-center h-full text-zinc-700 text-xs">—</div></div></td>
          <td class="p-1"><div class="cell" id="c-1-2"><div class="flex items-center justify-center h-full text-zinc-700 text-xs">—</div></div></td>
          <td class="p-1"><div class="cell" id="c-1-3"><div class="flex items-center justify-center h-full text-zinc-700 text-xs">—</div></div></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Timing -->
  <div id="timing" class="mt-4 text-xs text-zinc-600 space-y-1"></div>
</div>

<script>
const MODELS = [
  'gemini-3-pro-image-preview',
  'gemini-3.1-flash-image-preview',
  'imagen-4.0-fast-generate-001',
  'gemini-2.5-flash-image',
];
const DECADES = ['1920s', '1960s'];

let image1 = null;
let image2 = null;

function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      const MAX = 1024;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * (MAX / w)); w = MAX; }
        else { w = Math.round(w * (MAX / h)); h = MAX; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.8));
    };
    img.onerror = () => reject(new Error('Failed to load image'));
    img.src = URL.createObjectURL(file);
  });
}

// File upload helpers
function setupUpload(dropId, inputId, previewId, labelId, setter) {
  const drop = document.getElementById(dropId);
  const input = document.getElementById(inputId);
  const preview = document.getElementById(previewId);
  const label = document.getElementById(labelId);

  drop.addEventListener('click', () => input.click());
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
  drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
  input.addEventListener('change', e => handleFile(e.target.files[0]));

  async function handleFile(file) {
    if (!file) return;
    const dataUrl = await resizeImage(file);
    setter(dataUrl);
    preview.src = dataUrl;
    preview.classList.remove('hidden');
    label.classList.add('hidden');
    document.getElementById('go').disabled = false;
  }
}

setupUpload('drop-zone', 'file-input', 'preview', 'drop-label', v => { image1 = v; });
setupUpload('drop-zone-2', 'file-input-2', 'preview-2', 'drop-label-2', v => { image2 = v; });

function cleanBase64(dataUrl) {
  return dataUrl.replace(/^data:image\/(png|jpeg|jpg|webp);base64,/, '');
}

function setCell(row, col, content) {
  document.getElementById(`c-${row}-${col}`).innerHTML = content;
}

document.getElementById('go').addEventListener('click', async () => {
  if (!image1) return;
  const persona = document.getElementById('persona').value;
  const btn = document.getElementById('go');
  const status = document.getElementById('status');
  const timing = document.getElementById('timing');
  btn.disabled = true;
  btn.textContent = 'Running...';
  timing.innerHTML = '';
  status.textContent = `0/${MODELS.length * DECADES.length} complete`;

  // Set all cells to loading
  DECADES.forEach((_, r) => MODELS.forEach((_, c) => {
    setCell(r, c, '<div class="flex items-center justify-center h-full"><div class="spinner"></div></div>');
  }));

  let done = 0;
  const total = MODELS.length * DECADES.length;
  const times = {};

  const promises = [];
  DECADES.forEach((decade, r) => {
    MODELS.forEach((model, c) => {
      const t0 = performance.now();
      const p = fetch('/api/compare', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: cleanBase64(image1),
          secondImage: image2 ? cleanBase64(image2) : null,
          decade,
          persona,
          model,
        }),
      })
      .then(res => res.json())
      .then(data => {
        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
        times[`${decade}-${model}`] = elapsed;
        if (data.imageData) {
          setCell(r, c, `<img src="data:image/png;base64,${data.imageData}" /><div class="overlay"><span class="text-[10px] text-zinc-400">${elapsed}s</span></div>`);
        } else {
          setCell(r, c, `<div class="flex items-center justify-center h-full p-2 text-center"><span class="text-red-400 text-[10px]">${data.error || 'Failed'}</span></div>`);
        }
      })
      .catch(err => {
        setCell(r, c, `<div class="flex items-center justify-center h-full p-2"><span class="text-red-400 text-[10px]">${err.message}</span></div>`);
      })
      .finally(() => {
        done++;
        status.textContent = `${done}/${total} complete`;
      });
      promises.push(p);
    });
  });

  await Promise.allSettled(promises);
  btn.disabled = false;
  btn.textContent = 'Compare Models';
  status.textContent = 'Done';

  // Show timing summary
  const lines = MODELS.map((m, i) => {
    const t20 = times[`1920s-${m}`] || '—';
    const t60 = times[`1960s-${m}`] || '—';
    return `<div><span class="text-zinc-500">${m}:</span> ${t20}s / ${t60}s</div>`;
  });
  timing.innerHTML = '<div class="font-medium text-zinc-500 mb-1">Timing (1920s / 1960s):</div>' + lines.join('');
});
</script>
</body>
</html>
